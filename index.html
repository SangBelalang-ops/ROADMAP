<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; }
        /* Sidebar Menu */
        nav { width: 200px; background: #2c3e50; height: 100vh; color: white; padding: 20px; }
        nav h2 { font-size: 1.2rem; }
        nav ul { list-style: none; padding: 0; }
        nav li { padding: 10px 0; cursor: pointer; border-bottom: 1px solid #3e5871; }
        
        /* Konten Utama */
        main { flex: 1; padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .status { font-size: 0.8rem; font-weight: bold; color: #e67e22; }
    </style>
</head>
<body>

<nav>
    <h2>Roadmap 24-30</h2>
    <ul>
        <li>Dashboard</li>
        <li>Progress</li>
        <li>Pencapaian</li>
    </ul>
</nav>

<main>
    <h1>Selamat Datang di Perjalanan Anda</h1>
    <div class="grid">
        <div class="card">
            <h3>Usia 24 (Sekarang)</h3>
            <p>Start Point</p>
            <span class="status">● AKTIF</span>
        </div>
        <div class="card">
            <h3>Usia 25-26</h3>
            <p>Fasih Inggris C1-C2</p>
            <input type="checkbox"> Proses Sekarang
        </div>
        <div class="card">
            <h3>Usia 27-28</h3>
            <p>Fasih Mandarin HSK 5</p>
            <span class="status">COMING SOON</span>
        </div>
    </div>
</main>

</body>
</html>
