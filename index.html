<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Executive Roadmap Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fc;
            --panel: #ffffff;
            --primary: #6366f1;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --radius: 24px;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 40px; 
            color: #1e293b; 
        }

        .grid-layout { 
            display: grid; 
            grid-template-columns: 90px 1fr 340px; 
            gap: 30px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        /* Sidebar - Elegant Vertical */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .nav-btn { 
            height: 90px; background: var(--panel); border-radius: var(--radius);
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow); cursor: pointer; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .nav-btn:hover { background: var(--primary); color: white; transform: scale(1.05); }

        /* Main Dashboard Panel */
        .dashboard { background: var(--panel); padding: 50px; border-radius: 40px; box-shadow: var(--shadow); }
        h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.05em; margin-bottom: 50px; }

        /* Bubble Group - High Fidelity */
        .bubbles { display: flex; justify-content: space-between; margin-bottom: 70px; }
        .bubble { 
            width: 190px; height: 190px; border-radius: 50%; border: 1px solid #e2e8f0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 700; text-align: center; position: relative; transition: 0.5s;
        }
        .bubble-tag { 
            font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
            padding: 6px 12px; background: rgba(255,255,255,0.7); border-radius: 20px; margin-top: 12px;
        }

        /* Timeline & Milestone - Professional Layout */
        .milestone-wrapper { margin-top: 40px; display: flex; flex-direction: column; gap: 15px; }
        .m-bar { 
            height: 55px; background: #fffbeb; border-left: 6px solid #f59e0b; 
            display: flex; align-items: center; padding-left: 30px; 
            border-radius: 0 16px 16px 0; font-weight: 600; letter-spacing: 0.5px;
        }

        /* Achievement Panel */
        .ach-panel { background: var(--panel); padding: 40px; border-radius: 30px; box-shadow: var(--shadow); }
        .ach-list { list-style: none; padding: 0; margin: 30px 0; }
        .ach-list li { padding: 20px 0; border-bottom: 1px solid #f1f5f9; font-weight: 500; }
        .btn-finish { 
            background: #22c55e; color: white; padding: 22px; text-align: center; 
            border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="grid-layout">
    <div class="sidebar">
        <div class="nav-btn">🏠</div>
        <div class="nav-btn">📈</div>
        <div class="nav-btn">🏆</div>
    </div>

    <main class="dashboard">
        <h1>Personal Roadmap 24 - 30</h1>
        
        <div class="bubbles">
            <div class="bubble" style="background: #dcfce7;">IM HERE<br><span style="font-size: 1.5rem;">24</span></div>
            <div class="bubble" style="background: #fee2e2;">FASIH INGGRIS<br>C1-C2<div class="bubble-tag">Processing</div></div>
            <div class="bubble" style="background: #dbeafe;">FASIH MANDARIN<br>HSK 5<div class="bubble-tag">Coming Soon</div></div>
        </div>

        <div class="milestone-wrapper">
            <div class="m-bar" style="width: 75%;">ARMENIA DONE</div>
            <div class="m-bar" style="width: 85%; margin-left: 50px;">WHV AUSSIE</div>
            <div class="m-bar" style="width: 95%; margin-left: 100px;">S.KOM / S1</div>
        </div>
    </main>

    <aside class="ach-panel">
        <h3 style="font-size: 1.2rem;">ACHIEVEMENTS</h3>
        <ul class="ach-list">
            <li>Sarjana Komputer</li>
            <li>Fasih Inggris & Mandarin</li>
            <li>Pengalaman Internasional</li>
            <li>Paspor Bagus & Bersih</li>
        </ul>
        <div class="btn-finish">FINISH</div>
    </aside>
</div>

</body>
</html>
